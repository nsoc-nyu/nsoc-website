version = 1

[[annotations]]
path = [
    ".github/**",
    ".gitignore",
    "REUSE.toml",
    "hugo.toml",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = [
    "layouts/**",
    "content/**",
    "assets/**",
]
SPDX-FileCopyrightText = "© New York University"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = [
    "CONTRIBUTING.md",
    "README.md",
]
SPDX-FileCopyrightText = "© New York University"
SPDX-License-Identifier = "CC-BY-SA-4.0"

[[annotations]]
path = [
    "static/images/team/*",
]
SPDX-FileCopyrightText = "© The subject"
SPDX-License-Identifier = "LicenseRef-Restricted"

[[annotations]]
path = [
    "static/images/*.png",
    "static/images/*.svg",
    "static/fonts/nyu-perstare/**",
]
SPDX-FileCopyrightText = "© New York University"
SPDX-License-Identifier = "LicenseRef-Restricted"

[[annotations]]
path = [
    "static/fonts/dm-mono/**",
]
SPDX-FileCopyrightText = "© The DM Mono Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = [
    "static/fonts/inter/**",
]
SPDX-FileCopyrightText = "© The Inter Project Authors"
SPDX-License-Identifier = "OFL-1.1"
